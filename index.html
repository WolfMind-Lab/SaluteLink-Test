<!DOCTYPE html>
<html>
<head>
    <title>SaluteLink</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="app">

    <h1>SaluteLink</h1>
    <p class="subtitle">Health tracker personale</p>

    <!-- 📊 HOME -->
    <div id="home" class="page active">

        <div class="card">
            <h2>📊 Dashboard</h2>
            <p>Visite salvate: <span id="countVisite">0</span></p>
            <p>Referti salvati: <span id="countReferti">0</span></p>
        </div>

    </div>

    <!-- 📅 VISITE -->
    <div id="visite" class="page">

        <div class="card">
            <h2>📅 Nuova visita</h2>

            <input type="date" id="dataVisita">
            <button onclick="aggiungiVisita()">Aggiungi visita</button>

            <p id="today">Nessuna visita programmata</p>
        </div>

    </div>

    <!-- 📄 REFERTI -->
    <div id="referti" class="page">

        <div class="card">
            <h2>📄 Referti</h2>

            <input type="text" id="refertoInput" placeholder="Nome referto">
            <button onclick="aggiungiReferto()">Aggiungi referto</button>

            <ul id="listaReferti"></ul>
        </div>

    </div>

</div>

<!-- 📱 NAV BAR -->
<div class="navbar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('visite')">Visite</button>
    <button onclick="showPage('referti')">Referti</button>
</div>

<script>

function showPage(page) {
    document.querySelectorAll(".page").forEach(p => {
        p.classList.remove("active");
    });

    document.getElementById(page).classList.add("active");
}

function aggiungiVisita() {
    let data = document.getElementById("dataVisita").value;

    if (!data) return;

    document.getElementById("today").innerText =
        "Visita programmata: " + data;

    localStorage.setItem("visita", data);

    aggiornaDashboard();
}

function aggiungiReferto() {
    let testo = document.getElementById("refertoInput").value;

    if (!testo) return;

    let li = document.createElement("li");
    li.textContent = testo;

    document.getElementById("listaReferti").appendChild(li);

    localStorage.setItem("referti",
        document.getElementById("listaReferti").innerHTML
    );

    document.getElementById("refertoInput").value = "";

    aggiornaDashboard();
}

function aggiornaDashboard() {
    let visite = localStorage.getItem("visita") ? 1 : 0;
    let referti = document.querySelectorAll("#listaReferti li").length;

    document.getElementById("countVisite").innerText = visite;
    document.getElementById("countReferti").innerText = referti;
}

window.onload = function () {

    let visita = localStorage.getItem("visita");

    if (visita) {
        document.getElementById("today").innerText =
            "Visita programmata: " + visita;
    }

    let referti = localStorage.getItem("referti");

    if (referti) {
        document.getElementById("listaReferti").innerHTML = referti;
    }

    aggiornaDashboard();
};

</script>

</body>
</html>
