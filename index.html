<!DOCTYPE html>
<html>
<head>
    <title>SaluteLink</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="app">

    <h1>SaluteLink</h1>
    <p class="subtitle">Il tuo diario sanitario digitale</p>

    <!-- 📅 VISITA -->
    <div class="card">
        <h2>📅 Nuova visita</h2>

        <input type="date" id="dataVisita">
        <button onclick="aggiungiVisita()">Aggiungi visita</button>

        <p id="today">Nessuna visita programmata</p>
    </div>

    <!-- 📄 REFERTI -->
    <div class="card">
        <h2>📄 Referti</h2>

        <input type="text" id="refertoInput" placeholder="Nome referto">
        <button onclick="aggiungiReferto()">Aggiungi referto</button>

        <ul id="listaReferti"></ul>
    </div>

</div>

<script>

function aggiungiVisita() {
    let data = document.getElementById("dataVisita").value;

    if (!data) {
        alert("Seleziona una data");
        return;
    }

    document.getElementById("today").innerText =
        "Visita programmata: " + data;

    localStorage.setItem("visita", data);
}

function aggiungiReferto() {
    let testo = document.getElementById("refertoInput").value;

    if (!testo) return;

    let li = document.createElement("li");
    li.textContent = testo;

    document.getElementById("listaReferti").appendChild(li);

    localStorage.setItem("referti",
        document.getElementById("listaReferti").innerHTML
    );

    document.getElementById("refertoInput").value = "";
}

// 💾 CARICAMENTO DATI SALVATI
window.onload = function () {

    let visita = localStorage.getItem("visita");

    if (visita) {
        document.getElementById("today").innerText =
            "Visita programmata: " + visita;
    }

    let referti = localStorage.getItem("referti");

    if (referti) {
        document.getElementById("listaReferti").innerHTML = referti;
    }
};

</script>

</body>
</html>
