<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SaluteLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>SaluteLink</h1>
    <p>Digital Health Journal</p>
</header>

<main>

    <!-- DASHBOARD -->
    <section id="home" class="page active">
        <div class="card">
            <h2>Dashboard</h2>
            <div class="grid">
                <div>📅 Visite<br><span id="countVisits">0</span></div>
                <div>📄 Referti<br><span id="countReports">0</span></div>
                <div>💊 Farmaci<br><span id="countMeds">0</span></div>
            </div>
        </div>

        <div class="card">
            <h2>Profilo</h2>
            <input id="name" placeholder="Nome">
            <input id="age" type="number" placeholder="Età">
            <button onclick="saveProfile()">Salva</button>
            <p id="profileView"></p>
        </div>
    </section>

    <!-- VISITE -->
    <section id="visite" class="page">
        <div class="card">
            <h2>Visite mediche</h2>
            <input type="date" id="visitDate">
            <button onclick="addVisit()">Aggiungi visita</button>
            <p id="visitView"></p>
        </div>
    </section>

    <!-- REFERTI -->
    <section id="referti" class="page">
        <div class="card">
            <h2>Referti</h2>
            <input id="reportInput" placeholder="Nome referto">

            <select id="reportType">
                <option>Analisi</option>
                <option>Visita</option>
                <option>Radiologia</option>
            </select>

            <button onclick="addReport()">Aggiungi</button>

            <ul id="reportList"></ul>
        </div>
    </section>

    <!-- FARMACI -->
    <section id="farmaci" class="page">
        <div class="card">
            <h2>Farmaci</h2>
            <input id="medInput" placeholder="Nome farmaco">
            <button onclick="addMed()">Aggiungi</button>
            <ul id="medList"></ul>
        </div>
    </section>

</main>

<!-- NAV -->
<nav>
    <button onclick="go('home')">Home</button>
    <button onclick="go('visite')">Visite</button>
    <button onclick="go('referti')">Referti</button>
    <button onclick="go('farmaci')">Farmaci</button>
</nav>

<script src="app.js"></script>
</body>
</html>
