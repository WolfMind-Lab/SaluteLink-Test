<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SaluteLink Health Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>SaluteLink</h1>
    <p>Health Calendar Pro</p>
</header>

<main>

<!-- DASHBOARD -->
<section id="home" class="page active">

    <div class="card">
        <h2>📊 Dashboard</h2>

        <div class="grid">
            <div>Visite<br><b id="visiteCount">0</b></div>
            <div>Referti<br><b id="refertiCount">0</b></div>
            <div>Farmaci<br><b id="farmaciCount">0</b></div>
        </div>
    </div>

    <div class="card">
        <h3>📌 Timeline</h3>
        <div id="timeline"></div>
    </div>

</section>

<!-- CALENDARIO -->
<section id="visite" class="page">

    <div class="card">

        <h2>📅 Calendario Visite</h2>

        <div class="calendar-header">
            <button onclick="prevMonth()">⬅</button>
            <h3 id="monthLabel"></h3>
            <button onclick="nextMonth()">➡</button>
        </div>

        <div id="calendar"></div>

        <input id="visitNote" placeholder="Nota visita">

        <!-- ORARIO VERO -->
        <input type="time" id="visitTime">

        <button onclick="addVisit()">Aggiungi visita</button>

        <div id="visitList"></div>
    </div>

</section>

<!-- REFERTI -->
<section id="referti" class="page">

    <div class="card">

        <h2>📄 Referti</h2>

        <input id="reportName" placeholder="Nome referto">
        <textarea id="reportDesc" placeholder="Descrizione referto"></textarea>

        <button onclick="addReport()">Aggiungi referto</button>

        <div id="reportList"></div>
    </div>

</section>

<!-- FARMACI -->
<section id="farmaci" class="page">

    <div class="card">

        <h2>💊 Farmaci</h2>

        <input id="medName" placeholder="Nome farmaco">

        <input id="medDose" placeholder="Dose (es. 500mg)">

        <input type="time" id="medTime">

        <button onclick="addMed()">Aggiungi farmaco</button>

        <div id="medList"></div>
    </div>

</section>

</main>

<nav>
    <button onclick="go('home')">🏠</button>
    <button onclick="go('visite')">📅</button>
    <button onclick="go('referti')">📄</button>
    <button onclick="go('farmaci')">💊</button>
</nav>

<script src="app.js"></script>
</body>
</html>
