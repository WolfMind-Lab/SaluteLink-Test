<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SaluteLink PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <h1>SaluteLink</h1>
    <p>Cartella Clinica Digitale</p>
</header>

<main>

<!-- DASHBOARD -->
<section id="home" class="page active">
    <div class="card">
        <h2>📊 Dashboard</h2>

        <input id="search" placeholder="🔍 Cerca tutto..." oninput="searchAll()">

        <canvas id="chart" height="120"></canvas>

        <div class="grid">
            <div>Visite<br><b id="visiteCount">0</b></div>
            <div>Referti<br><b id="refertiCount">0</b></div>
            <div>Farmaci<br><b id="farmaciCount">0</b></div>
        </div>
    </div>

    <div class="card">
        <h3>📅 Timeline</h3>
        <div id="timeline"></div>
    </div>
</section>

<!-- VISITE -->
<section id="visite" class="page">
    <div class="card">
        <h2>📅 Visite</h2>

        <input type="date" id="visitDate">
        <input type="text" id="visitNote" placeholder="Nota">

        <button onclick="addVisit()">Aggiungi</button>

        <div id="visitList"></div>
    </div>
</section>

<!-- REFERTI -->
<section id="referti" class="page">
    <div class="card">
        <h2>📄 Referti</h2>

        <input id="reportInput" placeholder="Nome">
        <input id="reportDesc" placeholder="Descrizione">

        <select id="reportType">
            <option>Analisi</option>
            <option>Visita</option>
            <option>Radiologia</option>
        </select>

        <button onclick="addReport()">Aggiungi</button>

        <div id="reportList"></div>
    </div>
</section>

<!-- FARMACI -->
<section id="farmaci" class="page">
    <div class="card">
        <h2>💊 Farmaci</h2>

        <input id="medInput" placeholder="Nome">
        <input id="medDose" placeholder="Dose">
        <input id="medTime" placeholder="Orario">

        <button onclick="addMed()">Aggiungi</button>

        <div id="medList"></div>
    </div>
</section>

</main>

<nav>
    <button onclick="go('home')">🏠</button>
    <button onclick="go('visite')">📅</button>
    <button onclick="go('referti')">📄</button>
    <button onclick="go('farmaci')">💊</button>
</nav>

<script src="app.js"></script>
</body>
</html>
