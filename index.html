<!DOCTYPE html>
<html>
<head>
    <title>SaluteLink</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="app">

    <h1>SaluteLink</h1>
    <p class="subtitle">Health tracker personale</p>

    <!-- 🏠 HOME -->
    <div id="home" class="page active">

        <!-- 👤 PROFILO -->
        <div class="card">
            <h2>👤 Profilo</h2>
            <input id="nomeUtente" placeholder="Nome">
            <input id="etaUtente" type="number" placeholder="Età">
            <button onclick="salvaProfilo()">Salva profilo</button>
            <p id="profiloInfo"></p>
        </div>

        <!-- 📊 DASHBOARD -->
        <div class="card">
            <h2>📊 Dashboard</h2>
            <p>Visite: <span id="countVisite">0</span></p>
            <p>Referti: <span id="countReferti">0</span></p>
            <p>Farmaci: <span id="countFarmaci">0</span></p>
        </div>

        <!-- 📈 GRAFICO SEMPLICE -->
        <div class="card">
            <h2>📈 Attività salute</h2>
            <div id="barChart"></div>
        </div>

    </div>

    <!-- 📅 VISITE -->
    <div id="visite" class="page">

        <div class="card">
            <h2>📅 Nuova visita</h2>

            <input type="date" id="dataVisita">
            <button onclick="aggiungiVisita()">Aggiungi visita</button>

            <p id="today">Nessuna visita programmata</p>
        </div>

    </div>

    <!-- 📄 REFERTI -->
    <div id="referti" class="page">

        <div class="card">
            <h2>📄 Referti</h2>

            <input id="refertoInput" placeholder="Nome referto">
            <select id="categoriaReferto">
                <option>Analisi</option>
                <option>Visita</option>
                <option>Radiografia</option>
            </select>

            <button onclick="aggiungiReferto()">Aggiungi referto</button>

            <ul id="listaReferti"></ul>
        </div>

    </div>

    <!-- 💊 FARMACI -->
    <div id="farmaci" class="page">

        <div class="card">
            <h2>💊 Farmaci / Promemoria</h2>

            <input id="farmacoInput" placeholder="Nome farmaco">
            <button onclick="aggiungiFarmaco()">Aggiungi</button>

            <ul id="listaFarmaci"></ul>
        </div>

    </div>

</div>

<!-- 📱 NAV -->
<div class="navbar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('visite')">Visite</button>
    <button onclick="showPage('referti')">Referti</button>
    <button onclick="showPage('farmaci')">Farmaci</button>
</div>

<script>

function showPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

/* 👤 PROFILO */
function salvaProfilo() {
    let nome = document.getElementById("nomeUtente").value;
    let eta = document.getElementById("etaUtente").value;

    localStorage.setItem("nome", nome);
    localStorage.setItem("eta", eta);

    document.getElementById("profiloInfo").innerText =
        nome + " - " + eta + " anni";
}

/* 📅 VISITE */
function aggiungiVisita() {
    let data = document.getElementById("dataVisita").value;
    if (!data) return;

    localStorage.setItem("visita", data);
    document.getElementById("today").innerText = "Visita: " + data;
    aggiorna();
}

/* 📄 REFERTI */
function aggiungiReferto() {
    let testo = document.getElementById("refertoInput").value;
    let cat = document.getElementById("categoriaReferto").value;

    if (!testo) return;

    let li = document.createElement("li");
    li.textContent = cat + " - " + testo;

    document.getElementById("listaReferti").appendChild(li);

    salvaLista("referti", "listaReferti");
    aggiorna();
}

/* 💊 FARMACI */
function aggiungiFarmaco() {
    let testo = document.getElementById("farmacoInput").value;
    if (!testo) return;

    let li = document.createElement("li");
    li.textContent = testo;

    document.getElementById("listaFarmaci").appendChild(li);

    salvaLista("farmaci", "listaFarmaci");
    aggiorna();
}

/* 💾 SALVATAGGIO LISTE */
function salvaLista(key, id) {
    localStorage.setItem(key, document.getElementById(id).innerHTML);
}

/* 📊 DASHBOARD */
function aggiorna() {
    document.getElementById("countVisite").innerText =
        localStorage.getItem("visita") ? 1 : 0;

    document.getElementById("countReferti").innerText =
        document.querySelectorAll("#listaReferti li").length;

    document.getElementById("countFarmaci").innerText =
        document.querySelectorAll("#listaFarmaci li").length;

    grafico();
}

/* 📈 GRAFICO SEMPLICE */
function grafico() {
    let v = document.querySelectorAll("#listaReferti li").length;
    let f = document.querySelectorAll("#listaFarmaci li").length;

    document.getElementById("barChart").innerHTML =
        "Referti: " + "█".repeat(v) + "<br>Farmaci: " + "█".repeat(f);
}

/* 🚀 LOAD */
window.onload = function () {

    document.getElementById("today").innerText =
        "Visita: " + (localStorage.getItem("visita") || "nessuna");

    document.getElementById("listaReferti").innerHTML =
        localStorage.getItem("referti") || "";

    document.getElementById("listaFarmaci").innerHTML =
        localStorage.getItem("farmaci") || "";

    let nome = localStorage.getItem("nome");
    let eta = localStorage.getItem("eta");

    if (nome) {
        document.getElementById("profiloInfo").innerText =
            nome + " - " + eta + " anni";
    }

    aggiorna();
};

</script>

</body>
</html>
