<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SaluteLink Health Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <h1>SaluteLink</h1>
    <p>Health Pro Dashboard</p>
</header>

<main>

<!-- DASHBOARD -->
<section id="home" class="page active">

    <div class="card">
        <h2>📊 Stato Salute</h2>

        <canvas id="chart" height="120"></canvas>

        <div class="grid">
            <div>Visite<br><b id="visiteCount">0</b></div>
            <div>Referti<br><b id="refertiCount">0</b></div>
            <div>Farmaci<br><b id="farmaciCount">0</b></div>
        </div>
    </div>

    <div class="card">
        <h3>📌 Timeline Clinica</h3>
        <div id="timeline"></div>
    </div>

</section>

<!-- VISITE -->
<section id="visite" class="page">

    <div class="card">
        <h2>📅 Visite</h2>

        <input id="visitNote" placeholder="Nota visita">

        <select id="visitType">
            <option>Controllo</option>
            <option>Specialistica</option>
            <option>Esami</option>
            <option>Emergenza</option>
        </select>

        <select id="visitTime">
            <option>Mattina</option>
            <option>Pomeriggio</option>
            <option>Sera</option>
        </select>

        <button onclick="addVisit()">Aggiungi visita</button>

        <div id="visitList"></div>
    </div>

</section>

<!-- FARMACI -->
<section id="farmaci" class="page">

    <div class="card">
        <h2>💊 Farmaci</h2>

        <input id="medName" placeholder="Nome farmaco">

        <select id="medDose">
            <option>250mg</option>
            <option>500mg</option>
            <option>1000mg</option>
        </select>

        <select id="medTime">
            <option>Mattina</option>
            <option>Pranzo</option>
            <option>Sera</option>
            <option>Notte</option>
        </select>

        <button onclick="addMed()">Aggiungi farmaco</button>

        <div id="medList"></div>
    </div>

</section>

<!-- REFERTI -->
<section id="referti" class="page">

    <div class="card">
        <h2>📄 Referti</h2>

        <input id="reportName" placeholder="Nome referto">
        <input id="reportDesc" placeholder="Descrizione">

        <button onclick="addReport()">Aggiungi referto</button>

        <div id="reportList"></div>
    </div>

</section>

</main>

<nav>
    <button onclick="go('home')">🏠</button>
    <button onclick="go('visite')">📅</button>
    <button onclick="go('farmaci')">💊</button>
    <button onclick="go('referti')">📄</button>
</nav>

<script src="app.js"></script>

</body>
</html>
